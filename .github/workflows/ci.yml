name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Validate Liquid schemas
        run: |
          python3 -c "
          import re, json, pathlib, sys
          errors = []
          for p in pathlib.Path('sections').glob('*.liquid'):
              text = p.read_text()
              match = re.search(r'{\%\s*schema\s*\%}(.*?){\%\s*endschema\s*\%}', text, re.DOTALL)
              if match:
                  try:
                      json.loads(match.group(1))
                  except json.JSONDecodeError as e:
                      errors.append(f'{p}: {e}')
          for p in pathlib.Path('.').rglob('*.json'):
              try:
                  json.loads(p.read_text())
              except json.JSONDecodeError as e:
                  errors.append(f'{p}: {e}')
          if errors:
              for e in errors: print(e)
              sys.exit(1)
          print('All schemas and JSON valid')
          "
